services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drive_logger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drive_logger}
      POSTGRES_DB: ${POSTGRES_DB:-drive_trip_logger}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-drive_logger} -d ${POSTGRES_DB:-drive_trip_logger}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-drive_logger}:${POSTGRES_PASSWORD:-drive_logger}@db:5432/${POSTGRES_DB:-drive_trip_logger}?schema=public
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
